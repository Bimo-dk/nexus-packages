name: Publish

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@bimo-dk'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Test all packages
        run: npm test

      - name: Create release PR or publish via Changesets
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Node.js for GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://npm.pkg.github.com'
          scope: '@bimo-dk'

      - name: Mirror published packages to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          node -e "
            const pkgs = JSON.parse(process.env.PUBLISHED);
            const { execSync } = require('child_process');
            pkgs.forEach(({ name }) => {
              const dir = name.replace('@bimo-dk/nexus-', '');
              execSync('npm publish --registry https://npm.pkg.github.com', {
                cwd: \`packages/\${dir}\`,
                stdio: 'inherit'
              });
            });
          "
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
